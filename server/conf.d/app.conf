server {
    listen 80;
    server_name georeport.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl http2;

    server_name georeport.ru;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/ssl/crt.crt;
    ssl_certificate_key /etc/ssl/key.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    resolver 8.8.4.4 8.8.8.8 valid=300s;

    add_header Strict-Transport-Security "max-age=15768000" always;

    error_log /var/log/error_nginx.log;
    access_log /var/log/access_log_nginx.log;

    client_max_body_size 50m;

    # React build assets (JS, CSS, media)
    location ~ ^/static/(js|css|media)/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }

    # Backend API and backend static files (docs, images)
    location ~ ^/(auth|reports|files|s3|stat|test_type_files|metrics|static|docs|openapi\.json|redoc) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Everything else → frontend (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
