resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;

    client_max_body_size 50m;

    # SvelteKit build assets
    location /_app/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Static files from Svelte (images, fonts)
    location /images/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
    }

    location /fonts/ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
    }

    # Backend API and backend static files (docs, images)
    location ~ ^/(auth|reports|files|s3|stat|test_type_files|metrics|static|docs|openapi\.json|redoc) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Everything else → frontend (SPA)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
