services:
  backend:
    build: ./backend/
    command: bash -c 'poetry run uvicorn main:app --host 0.0.0.0 --port 8000'
    environment:
      - FILE_COUNT=10
      - FILE_SIZE=1024
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_NAME}
      - WORK_TYPE=${WORK_TYPE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SUPERUSER_NAME=${SUPERUSER_NAME}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD}
      - AWS_URI=${AWS_URI}
      - AWS_ACCCESS_KEY=${AWS_ACCCESS_KEY}
      - AWS_SERVICE_NAME=${AWS_SERVICE_NAME}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_BUCKET=${AWS_BUCKET}
      - REDIS_URL=redis://redis:6379
    expose:
      - "8000"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  frontend:
    build:
      context: ./frontend/
      args:
        - REACT_APP_SERVER_IP=/
    expose:
      - "80"
    restart: unless-stopped
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: nginx
    restart: always
    volumes:
      - ./app/key.key:/etc/ssl/key.key:ro
      - ./app/crt.crt:/etc/ssl/crt.crt:ro
      - ./server/conf.d:/etc/nginx/conf.d:ro
      - ./app:/app:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  redis_data:
